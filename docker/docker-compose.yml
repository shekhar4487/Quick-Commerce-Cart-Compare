# Local development infra: Postgres + Redis + the scraper worker.
# Run from the repo root:  docker compose -f docker/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cartcompare
      POSTGRES_PASSWORD: cartcompare
      POSTGRES_DB: cartcompare
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://cartcompare:cartcompare@postgres:5432/cartcompare
      DIRECT_URL: postgresql://cartcompare:cartcompare@postgres:5432/cartcompare
      REDIS_URL: redis://redis:6379
      SCRAPER_HEADLESS: "true"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  pgdata:
